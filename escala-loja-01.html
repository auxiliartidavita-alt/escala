<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background: #1a1a2e;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      
      /* ==================================================================
         AJUSTE DE TAMANHO PARA TELA 1920x1080
         ==================================================================
         Se quiser mudar o ajuste fino, troque as 3 linhas abaixo pelos valores:
         
         Para 65%: width: 2954px; height: 1662px; transform: scale(0.65);
         Para 60%: width: 3200px; height: 1800px; transform: scale(0.6);
         Para 55%: width: 3490px; height: 1963px; transform: scale(0.55);
      */
      width: 3096px;  
      height: 1742px; 
      transform: scale(0.52); 
      /* ================================================================== */

      transform-origin: top left;
    }
  </style>
</head>
<body>

  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false"></iframe>

</body>
</html>
