<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
      background: #1a1a2e;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* O pulo do gato definitivo: 
       Enganamos o motor do quiosque aplicando o estilo antigo de zoom direto na tag inline */
    iframe {
      border: none;
      width: 134%;  /* Aumenta a área de renderização do Google */
      height: 134%; /* Aumenta a área de renderização do Google */
      
      /* Força o zoom a 75% usando CSS padrão que navegadores de TV e quiosque aceitam sem quebrar o link */
      zoom: 0.75;
      -webkit-zoom: 0.75;
    }
  </style>
</head>
<body>

  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false"></iframe>

</body>
</html>
