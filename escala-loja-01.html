<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala Loja 01</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #16213e;
      border-bottom: 3px solid #0f3460;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 10;
    }
    .badge {
      background: #0f3460;
      color: #e94560;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
    }
    header h1 {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
    }
    .sheet-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <span class="badge">📋 Escala</span>
    <h1>Loja 01</h1>
  </header>
  <div class="sheet-container">
    <!-- Versão publicada da planilha - apenas células, sem menus -->
    <iframe src="https://docs.google.com/spreadsheets/d/1ApxBDFjEkHXsV16KxfTla1A3Z6q9IaYlEt0wDoGEQmc/pubhtml?widget=true&amp;headers=false"></iframe>
  </div>
</body>
</html>
