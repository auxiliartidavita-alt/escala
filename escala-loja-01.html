<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html {
      background: #1a1a2e;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      
      /* PULO DO GATO: Força o zoom no BODY da página inteira. 
         Usamos as duas propriedades juntas para garantir que o quiosque pegue uma delas. */
      zoom: 0.8; 
      -webkit-zoom: 0.8;
      transform: scale(0.8);
      transform-origin: top left;

      /* Como encolhemos o body para 80%, a área dele precisa crescer 
         para cobrir a tela cheia do monitor (100 / 0.8 = 125) */
      width: 125vw;
      height: 125vh;
    }

    iframe {
      /* Agora o iframe apenas segue o tamanho do body modificado */
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="planilha-iframe"></iframe>

  <script>
    const URL_DA_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false"; 
    
    function carregarPlanilha() {
        const iframe = document.getElementById('planilha-iframe');
        const timestamp = new Date().getTime(); 
        const separador = URL_DA_PLANILHA.includes('?') ? '&' : '?';
        iframe.src = URL_DA_PLANILHA + separador + "cache_bust=" + timestamp;
    }

    carregarPlanilha();
    setInterval(carregarPlanilha, 900000);
  </script>
</body>
</html>
