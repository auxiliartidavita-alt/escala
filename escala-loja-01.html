<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background: #1a1a2e;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Container para travar o tamanho da tela cheia do Quiosque e sumir com bordas */
    .kiosk-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;

      /* A SOLUÇÃO DEFINITIVA:
        Aumentamos o tamanho "virtual" do frame para 130% para o Google Sheets 
        renderizar mais colunas/linhas na mesma tela, e usamos o transform 
        apenas para encaixar essa imagem de alta densidade de volta nos limites do app.
      */
      width: 130%;
      height: 130%;
      
      transform: scale(0.77); /* Ajusta a proporção exata para sumir com as bordas pretas */
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <div class="kiosk-wrapper">
    <iframe id="planilha-iframe"></iframe>
  </div>

  <script>
    // Adicionei o parâmetro fzr=true (Freeze Rows/Render optimization) que ajuda o Sheets a recalcular o tamanho interno
    const URL_DA_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false&fzr=true"; 
    
    function carregarPlanilha() {
        const iframe = document.getElementById('planilha-iframe');
        const timestamp = new Date().getTime(); 
        const separador = URL_DA_PLANILHA.includes('?') ? '&' : '?';
        iframe.src = URL_DA_PLANILHA + separador + "cache_bust=" + timestamp;
    }

    carregarPlanilha();
    setInterval(carregarPlanilha, 900000);
  </script>
</body>
</html>
