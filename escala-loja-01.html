<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background: #1a1a2e;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      
      /* TELA VIRTUAL 4K: 
         Força o Google Sheets a mostrar o dobro de informações na tela */
      width: 3840px;
      height: 2160px;
      
      /* ZOOM EM 50%: 
         Esmaga os 3840px de volta para os 1920px da sua tela física */
      transform: scale(0.55);
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false"></iframe>

</body>
</html>
