<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala Loja 01</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #16213e;
      border-bottom: 3px solid #0f3460;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .badge {
      background: #0f3460;
      color: #e94560;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
    }
    header h1 {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <span class="badge">Escala</span>
    <h1>Loja 01</h1>
  </header>
  <iframe src="https://drive.google.com/file/d/1HscQs-_oyRsJ4F9mEMa6xQZGm5-u89n6/preview"></iframe>
</body>
</html>
