<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala Loja 01</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #16213e;
      border-bottom: 3px solid #0f3460;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 10; /* Garante que o header fique por cima do iframe com zoom */
    }
    .badge {
      background: #0f3460;
      color: #e94560;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
    }
    header h1 {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
    }
    
    /* Container que vai esconder o botão "Outra janela" e as barras do Google */
    .sheet-container {
      flex: 1;
      position: relative;
      overflow: hidden; /* Esconde tudo o que passar dos limites desta div */
      background: #ffffff;
    }

    /* O pulo do gato: Mascarar os controles e aplicar o Zoom */
    iframe {
      position: absolute;
      
      /* Empurra o topo e a direita para fora da área visível, sumindo com o botão */
      top: -40px; 
      right: -50px; 
      
      /* Define uma área maior para compensar o corte */
      width: calc(100% + 50px);
      height: calc(100% + 40px);
      border: none;

      /* CONTROLADOR DE ZOOM: Altera o tamanho geral da tabela interna */
      /* 1.15 significa 115% de zoom. Se quiser mais zoom, mude para 1.2 ou 1.3 */
      transform: scale(1.15);
      transform-origin: top left; /* Mantém o zoom alinhado a partir do canto superior esquerdo */
    }
  </style>
</head>
<body>
  <header>
    <span class="badge">Escala</span>
    <h1>Loja 01</h1>
  </header>
  <div class="sheet-container">
    <iframe src="https://drive.google.com/uc?export=view&id=1Trsjdyk6QLx-P31qXUr-w9mSyZc9BJ4p"></iframe>
  </div>
</body>
</html>
