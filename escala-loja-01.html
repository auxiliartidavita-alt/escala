<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      background: #1a1a2e;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="planilha-iframe"></iframe>

  <script>
    /* MUDANÇA DE ESTRUTURA: 
      Trocamos o '/pubhtml' pesado por '/htmlview?gid=0' (modo Grid).
      Isso faz o próprio Google Sheets renderizar a tabela de forma mais compacta e limpa, 
      o que deve fazer ela aparecer menor e sem os menus pesados dentro do freekiosk.
    */
    const URL_DA_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/htmlview?gid=0"; 
    
    function carregarPlanilha() {
        const iframe = document.getElementById('planilha-iframe');
        const timestamp = new Date().getTime(); 
        const separador = URL_DA_PLANILHA.includes('?') ? '&' : '?';
        iframe.src = URL_DA_PLANILHA + separador + "cache_bust=" + timestamp;
    }

    carregarPlanilha();
    setInterval(carregarPlanilha, 900000);
  </script>
</body>
</html>
