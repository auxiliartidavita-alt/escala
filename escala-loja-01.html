<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      
      /* PULO DO GATO:
         Para escala 0.8 (80%), a largura/altura precisam ser 125% (100 / 0.8)
         Isso evita que fiquem faixas pretas ou vazias na tela.
      */
      width: 125vw;  
      height: 125vh; 
      
      /* CONTROLADOR DE ZOOM: 0.8 significa 80% do tamanho original */
      transform: scale(0.7); 
      transform-origin: top left; /* Mantém o alinhamento no canto superior esquerdo */
    }
  </style>
</head>
<body>

  <iframe id="planilha-iframe"></iframe>

  <script>
    // Link da sua escala puxado do seu código original
    const URL_DA_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false"; 
    
    function carregarPlanilha() {
        const iframe = document.getElementById('planilha-iframe');
        const timestamp = new Date().getTime(); 
        
        // Como sua URL já tem "?", ele vai usar o "&" automaticamente para juntar o cache_bust
        const separador = URL_DA_PLANILHA.includes('?') ? '&' : '?';
        
        iframe.src = URL_DA_PLANILHA + separador + "cache_bust=" + timestamp;
    }

    // Carrega a planilha assim que a página abre
    carregarPlanilha();

    // Atualiza de 15 em 15 minutos (900000 milissegundos)
    setInterval(carregarPlanilha, 900000);
  </script>
</body>
