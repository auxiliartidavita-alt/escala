<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background: #1a1a2e;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      
      /* VALORES FIXOS EM PIXELS: 
         Em vez de %, definimos uma tela virtual gigante de 2560x1440.
         Isso força o Google Sheets a renderizar tudo menor (alta resolução). */
      width: 2560px;
      height: 1440px;
      
      /* Reduzimos o bloco inteiro de volta para caber em uma tela Full HD (1920x1080)
         2560 * 0.75 = 1920 / 1440 * 0.75 = 1080 */
      transform: scale(0.75);
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRid0TW5iKM2whYOHoYXnOza7CAmERYzUCtdoGl3rTI5oEfMrZ6wmburxRv2e2Xnw0zggE39Al19zib/pubhtml?widget=true&headers=false"></iframe>

</body>
</html>
